<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AMAS - Asian Missionary Theological Seminary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for cleaner mobile look */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      :root {
        --amas-safe-top: env(safe-area-inset-top, 0px);
        --amas-safe-bottom: env(safe-area-inset-bottom, 0px);
        --amas-top-chrome-height: calc(var(--amas-safe-top) + 104px);
        --amas-top-chrome-gradient: linear-gradient(90deg, #1e3a8a 0%, #1e40af 52%, #1e3a8a 100%);
      }
      html, body, #root {
        height: 100%;
        overflow: hidden;
      }
      html {
        background: #1e3a8a;
      }
      body {
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background:
          linear-gradient(
            180deg,
            #1e3a8a 0,
            #1e40af calc(var(--amas-safe-top) + 92px),
            #f8fafc calc(var(--amas-safe-top) + 92px),
            #f8fafc 100%
          );
        -webkit-tap-highlight-color: transparent;
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--amas-top-chrome-height);
        background: var(--amas-top-chrome-gradient);
        box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.08);
        pointer-events: none;
        z-index: 0;
      }
      #root {
        min-height: 100%;
        position: relative;
        z-index: 1;
      }
      input, textarea, select {
        font-size: 16px;
      }

      .pt-safe-header {
        padding-top: calc(var(--amas-safe-top) + 0.9rem);
      }

      /* Squircle Avatar Style - Standard App Icon Look */
      .rounded-squircle {
        border-radius: 32%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }

      /* Safe Area Utilities */
      .pt-safe-top {
        padding-top: max(calc(var(--amas-safe-top) + 6px), 64px);
      }
      .pt-safe-top-college {
        padding-top: max(calc(var(--amas-safe-top) + 6px), 64px);
      }
      .pb-safe-area {
        padding-bottom: var(--amas-safe-bottom);
      }
      /* Keep just enough bottom space for the lowered fixed nav */
      .pb-24 {
        padding-bottom: max(4.5rem, calc(4.5rem + var(--amas-safe-bottom) - 25px)) !important;
      }
      
      /* Scrollbar Hide Utility */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up {
        animation: slideUp 0.3s ease-out forwards;
      }

      @keyframes slideInRight {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      .animate-slide-in-right {
        animation: slideInRight 0.3s ease-out forwards;
      }

      @keyframes fadeInUp {
        from { transform: translateY(10px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.4s ease-out forwards;
      }

      @keyframes scaleIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .animate-scale-in {
        animation: scaleIn 0.2s ease-out forwards;
      }

      @keyframes bounceSubtle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .animate-bounce-subtle {
        animation: bounceSubtle 2s infinite;
      }
      
      @keyframes widthGrow {
        from { width: 0; }
        to { width: 100%; }
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] {
        margin: 6px 0 10px !important;
        padding: 14px 16px !important;
        border-radius: 24px !important;
        border-color: rgba(191, 219, 254, 0.55) !important;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 252, 0.96) 100%) !important;
        box-shadow: 0 12px 30px rgba(30, 64, 175, 0.08) !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] > [class="mb-3 flex items-center justify-between"] {
        margin-bottom: 10px !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] h3 {
        font-size: 17px !important;
        line-height: 1.1 !important;
        letter-spacing: -0.02em !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="flex items-center text-[10px] font-bold text-blue-700"] {
        font-size: 11px !important;
        gap: 4px !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="flex w-full items-center rounded-2xl border border-slate-100 bg-slate-50 px-3 py-3 text-left transition hover:bg-white hover:shadow-sm"] {
        min-height: 92px !important;
        padding: 10px 12px !important;
        border-radius: 20px !important;
        border-color: rgba(226, 232, 240, 0.9) !important;
        background: linear-gradient(180deg, #f8fbff 0%, #f5f7fb 100%) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75) !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="mr-3 h-12 w-12 rounded-xl object-cover"] {
        width: 44px !important;
        height: 44px !important;
        margin-right: 12px !important;
        border-radius: 14px !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="truncate text-sm font-bold text-slate-800"] {
        font-size: 13px !important;
        line-height: 1.2 !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="mt-1 truncate text-xs text-slate-500"] {
        margin-top: 3px !important;
        font-size: 11px !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="mt-2 flex items-center justify-between"] {
        margin-top: 6px !important;
      }

      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="shrink-0 text-[10px] font-bold text-slate-400"],
      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="text-[10px] font-bold text-blue-800"],
      [class="mb-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"] [class="text-[10px] font-bold text-slate-500"] {
        font-size: 10px !important;
      }
    </style>
